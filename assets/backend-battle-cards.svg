<svg width="1200" height="330" viewBox="0 0 1200 330" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { fill: #e2e8f0; font-family: Segoe UI, Inter, Arial, sans-serif; font-size: 20px; font-weight: 800; }
      .body { fill: #94a3b8; font-family: Cascadia Code, Consolas, monospace; font-size: 13px; }
      .chip { fill: #67e8f9; font-family: Cascadia Code, Consolas, monospace; font-size: 12px; font-weight: 700; }
      .card { fill: #0f172a; stroke-width: 1.4; }
    </style>
  </defs>

  <rect width="1200" height="330" rx="28" fill="url(#bg)"/>
  <text x="600" y="50" text-anchor="middle" fill="#67e8f9" font-family="Cascadia Code, Consolas, monospace" font-size="18" letter-spacing="3">
    backend battle cards
  </text>

  <g transform="translate(55 92)">
    <rect class="card" width="250" height="170" rx="22" stroke="#22d3ee"/>
    <text x="28" y="44" class="title">Cache Defense</text>
    <text x="28" y="78" class="body">penetration / breakdown</text>
    <text x="28" y="102" class="body">avalanche protection</text>
    <rect x="28" y="126" width="104" height="28" rx="14" fill="#083344"/>
    <text x="80" y="145" text-anchor="middle" class="chip">Redis</text>
    <circle cx="220" cy="35" r="7" fill="#22d3ee" filter="url(#glow)">
      <animate attributeName="opacity" values=".25;1;.25" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(335 92)">
    <rect class="card" width="250" height="170" rx="22" stroke="#22c55e"/>
    <text x="28" y="44" class="title">Flash Sale</text>
    <text x="28" y="78" class="body">atomic stock deduction</text>
    <text x="28" y="102" class="body">one user, one order</text>
    <rect x="28" y="126" width="92" height="28" rx="14" fill="#052e16"/>
    <text x="74" y="145" text-anchor="middle" class="chip">Lua</text>
    <circle cx="220" cy="35" r="7" fill="#22c55e" filter="url(#glow)">
      <animate attributeName="opacity" values="1;.25;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(615 92)">
    <rect class="card" width="250" height="170" rx="22" stroke="#f97316"/>
    <text x="28" y="44" class="title">Async Orders</text>
    <text x="28" y="78" class="body">peak shaving</text>
    <text x="28" y="102" class="body">stream / queue workers</text>
    <rect x="28" y="126" width="126" height="28" rx="14" fill="#431407"/>
    <text x="91" y="145" text-anchor="middle" class="chip">RabbitMQ</text>
    <circle cx="220" cy="35" r="7" fill="#f97316" filter="url(#glow)">
      <animate attributeName="opacity" values=".35;1;.35" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(895 92)">
    <rect class="card" width="250" height="170" rx="22" stroke="#a78bfa"/>
    <text x="28" y="44" class="title">Geo &amp; Metrics</text>
    <text x="28" y="78" class="body">nearby shops / UV stats</text>
    <text x="28" y="102" class="body">sign-in bitmap</text>
    <rect x="28" y="126" width="118" height="28" rx="14" fill="#2e1065"/>
    <text x="87" y="145" text-anchor="middle" class="chip">GEO / HLL</text>
    <circle cx="220" cy="35" r="7" fill="#a78bfa" filter="url(#glow)">
      <animate attributeName="opacity" values="1;.3;1" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <path d="M160 286 H1040" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
  <circle cx="160" cy="286" r="6" fill="#67e8f9">
    <animate attributeName="cx" values="160;440;720;1040;160" dur="6.5s" repeatCount="indefinite"/>
  </circle>
</svg>
