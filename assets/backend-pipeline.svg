<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06111f"/>
      <stop offset="0.55" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .card { fill: #0f172a; stroke: #38bdf8; stroke-opacity: .35; stroke-width: 1.4; }
      .label { fill: #f8fafc; font-family: Segoe UI, Inter, Arial, sans-serif; font-size: 23px; font-weight: 700; }
      .sub { fill: #94a3b8; font-family: Cascadia Code, Consolas, monospace; font-size: 14px; }
      .line { stroke: #334155; stroke-width: 4; stroke-linecap: round; }
      .dot { fill: #22c55e; filter: url(#softGlow); }
    </style>
  </defs>

  <rect width="1200" height="300" rx="26" fill="url(#panel)"/>
  <rect x="22" y="22" width="1156" height="256" rx="22" stroke="#38bdf8" stroke-opacity=".18"/>

  <text x="600" y="54" text-anchor="middle" fill="#67e8f9" font-family="Cascadia Code, Consolas, monospace" font-size="18" letter-spacing="2">
    backend request pipeline
  </text>

  <path class="line" d="M205 150 H365"/>
  <path class="line" d="M515 150 H675"/>
  <path class="line" d="M825 150 H982"/>

  <rect x="70" y="100" width="140" height="100" rx="18" class="card"/>
  <text x="140" y="142" text-anchor="middle" class="label">Client</text>
  <text x="140" y="169" text-anchor="middle" class="sub">HTTP / JWT</text>

  <rect x="365" y="100" width="150" height="100" rx="18" class="card"/>
  <text x="440" y="142" text-anchor="middle" class="label">Nginx</text>
  <text x="440" y="169" text-anchor="middle" class="sub">proxy / LB</text>

  <rect x="675" y="100" width="150" height="100" rx="18" class="card"/>
  <text x="750" y="142" text-anchor="middle" class="label">Spring</text>
  <text x="750" y="169" text-anchor="middle" class="sub">Boot APIs</text>

  <g>
    <rect x="982" y="72" width="145" height="52" rx="14" class="card"/>
    <text x="1054" y="104" text-anchor="middle" class="label" font-size="20">Redis</text>
    <rect x="982" y="134" width="145" height="52" rx="14" class="card"/>
    <text x="1054" y="166" text-anchor="middle" class="label" font-size="20">MySQL</text>
    <rect x="982" y="196" width="145" height="52" rx="14" class="card"/>
    <text x="1054" y="228" text-anchor="middle" class="label" font-size="20">RabbitMQ</text>
  </g>

  <circle class="dot" r="7" cx="205" cy="150">
    <animate attributeName="cx" values="205;365;515;675;825;982" dur="4.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".35;1;.35" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <rect x="-130" y="0" width="120" height="300" fill="url(#pulse)" opacity=".18">
    <animate attributeName="x" from="-140" to="1220" dur="6s" repeatCount="indefinite"/>
  </rect>

  <text x="600" y="266" text-anchor="middle" fill="#94a3b8" font-family="Cascadia Code, Consolas, monospace" font-size="15">
    cache hot data / persist core data / async heavy work
  </text>
</svg>
